name: Deploy Laravel Production

on:
  push:
    branches:
      - production

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sdmuhkk-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Rumahweb
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Configure SSH
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"

          ssh-keyscan \
            -p "$SSH_PORT" \
            -H "$SSH_HOST" \
            > "$HOME/.ssh/known_hosts"

          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Run Rumahweb deployment
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail

          ssh \
            -i "$HOME/.ssh/id_ed25519" \
            -p "$SSH_PORT" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=30 \
            "$SSH_USER@$SSH_HOST" \
            "/home/sdmb5444/deploy.sh"